<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Mode</title>
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
<style>

body {
    background-image: url("{{ url_for('static', filename='timer.gif') }}");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    padding-top: 50px;
    font-family: 'Silkscreen', cursive;
    margin: 0;
}

h1 {
    font-size: 36px;
    margin-bottom: 15px;
    text-align: center;
    color: white;
}

#timer {
    font-size: 70px;
    margin: 25px 0;
    color: rgb(255, 255, 255);
    padding: 10px 20px;
}

#stars {
    font-size: 28px;
    margin-bottom: 30px;
    letter-spacing: 8px;
}

button {
    background-color: black;
    color: white;
    border: 2px solid white;
    border-radius: 30px;
    padding: 12px 22px;
    margin: 8px;
    cursor: pointer;
    font-family: 'Silkscreen', cursive;
    transition: .3s;
}

button:hover {
    background: rgba(255,255,255,.18);
    transform: scale(1.05);
}

#datetime {
    margin-top: 35px;
    text-align: center;
    font-size: 15px;
    color: aliceblue;
}

.spotify-box {
    position: fixed;
    left: 40px;
    top: 40px;
    width: 330px;
    padding: 20px;
    background: rgba(0,0,0,.35);
    backdrop-filter: blur(10px);
    border-radius: 25px;
    border: 2px solid rgba(255,255,255,.2);
}

.spotify-box h2 {
    color: white;
    text-align: center;
    margin-bottom: 15px;
    text-shadow:
        -2px -2px #000,
         2px -2px #000,
        -2px 2px #000,
         2px 2px #000;
}

.spotify-box select {
    width: 100%;
    padding: 10px;
    border-radius: 15px;
    border: none;
    font-family: 'Silkscreen', cursive;
    background: black;
    color: white;
}

.mode-toggle {
    position: fixed;
    top: 25px;
    right: 30px;
    z-index: 1000;
}

.mode-toggle a {
    text-decoration: none;
    font-family: 'Silkscreen', cursive;
    color: white;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(10px);
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 30px;
    padding: 12px 22px;
    transition: 0.3s;
    display: inline-block;
    text-shadow:
        -2px -2px #000,
         2px -2px #000,
        -2px  2px #000,
         2px  2px #000;
}

.mode-toggle a:hover {
    background: rgba(255,255,255,0.15);
    transform: translateY(-2px);
    border-color: white;
}
{% include 'responsive.css' %}
</style>
</head>

<body>

<div class="mode-toggle">
    <a href="{{ url_for('index') }}">📚 Library</a>
</div>

<div>
    <h1>📺 FOCUS MODE</h1>
    <h2 id="mode" style="text-align:center; color:#F5E6C8; margin-bottom:20px;">
        📖 Study Session
    </h2>

    <div style="text-align: center;">
        <div id="timer">25:00</div>
        <div id="stars">☆ ☆ ☆ ☆</div>
    </div>

    <div style="text-align:center">
        <button id="start">▶ START</button>
        <button id="pause">⏸ PAUSE</button>
        <button id="reset">🔄 RESET</button>
    </div>

    <br><br>

    <div id="datetime"></div>
</div>

<div class="spotify-box">
    <h2>🎧 READING AMBIENCE</h2>

    <select id="playlistSelect">
        <option value="37i9dQZF1DX8NTLI2TtZa6">☕ Coffeehouse Jazz</option>
        <option value="37i9dQZF1DX0SM0LYsmbMT">🌧 Peaceful Piano</option>
        <option value="37i9dQZF1DWYoYGBbGKurt">🎹 Lo-Fi Beats</option>
        <option value="37i9dQZF1DWWEJlAGA9gs0">🎻 Classical Essentials</option>
        <option value="37i9dQZF1DWZd79rJ6a7lp">🌙 Deep Focus</option>
    </select>

    <br><br>

    <iframe
        id="spotifyPlayer"
        style="border-radius:15px"
        src="https://open.spotify.com/embed/playlist/37i9dQZF1DX8NTLI2TtZa6"
        width="100%"
        height="352"
        frameborder="0"
        allowfullscreen=""
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>
</div>

<footer style="text-align: center; color: #ffffff; margin-top: 20px;">
    &copy; 2026 Plotcrafter.
</footer>

<script>
let focusTime = 25 * 60;
let shortBreak = 5 * 60;
let longBreak = 15 * 60;
let timeLeft = focusTime;
let completed = 0;
let timer;
let currentMode = "focus";

function displayTime() {
    let mins = Math.floor(timeLeft / 60);
    let secs = timeLeft % 60;
    document.getElementById("timer").innerHTML =
        mins.toString().padStart(2, "0") + ":" +
        secs.toString().padStart(2, "0");
}
displayTime();

document.getElementById("start").onclick = function () {
    clearInterval(timer);
    timer = setInterval(function () {
        timeLeft--;
        displayTime();
        if (timeLeft <= 0) {
            clearInterval(timer);
            sessionFinished();
        }
    }, 1000);
};

document.getElementById("pause").onclick = function () {
    clearInterval(timer);
};

document.getElementById("reset").onclick = function () {
    clearInterval(timer);
    currentMode = "focus";
    document.getElementById("mode").innerHTML = "📖 Reading Session";
    timeLeft = focusTime;
    displayTime();
};

function sessionFinished() {
    if (currentMode == "focus") {
        completed++;
        updateStars();
        if (completed % 4 == 0) {
            currentMode = "long";
            document.getElementById("mode").innerHTML = "🌙 Long Break";
            timeLeft = longBreak;
        } else {
            currentMode = "break";
            document.getElementById("mode").innerHTML = "☕ Tea Break";
            timeLeft = shortBreak;
        }
    } else {
        currentMode = "focus";
        document.getElementById("mode").innerHTML = "📖 Reading Session";
        timeLeft = focusTime;
    }
    displayTime();
    alert("Session Complete!");
}

function updateStars() {
    let stars = "";
    for (let i = 0; i < 4; i++) {
        stars += (i < completed % 4) ? "⭐ " : "☆ ";
    }
    document.getElementById("stars").innerHTML = stars;
}

function updateDateTime() {
    let now = new Date();
    document.getElementById("datetime").innerHTML =
        "📅 " + now.toLocaleDateString("en-IN", {
            weekday: "long",
            day: "numeric",
            month: "long",
            year: "numeric"
        }) +
        "<br>🕒 " + now.toLocaleTimeString("en-IN");
}
updateDateTime();
setInterval(updateDateTime, 1000);

const playlist = document.getElementById("playlistSelect");
playlist.onchange = function () {
    let id = this.value;
    document.getElementById("spotifyPlayer").src =
        "https://open.spotify.com/embed/playlist/" + id;
};
</script>

</body>
</html>
