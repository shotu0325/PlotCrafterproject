{% macro review_widget(book) %}
<details class="review-widget">
    <summary>
        {% if book.avg_rating %}
            ⭐ {{ book.avg_rating }}/5 ({{ book.review_count }})
        {% else %}
            ☆ No reviews — add one
        {% endif %}
    </summary>
    <form action="{{ url_for('add_review', isbn=book['ISBN']) }}" method="POST" class="mini-review-form">
        <input type="hidden" name="next" value="{{ request.full_path }}">
        <input type="text" name="reviewer_name" placeholder="Your name" required maxlength="50">
        <select name="rating" required>
            <option value="">Rating</option>
            <option value="5">⭐⭐⭐⭐⭐</option>
            <option value="4">⭐⭐⭐⭐</option>
            <option value="3">⭐⭐⭐</option>
            <option value="2">⭐⭐</option>
            <option value="1">⭐</option>
        </select>
        <textarea name="review_text" rows="2" placeholder="Optional comment" maxlength="500"></textarea>
        <button type="submit">Submit</button>
    </form>
</details>
{% endmacro %}
